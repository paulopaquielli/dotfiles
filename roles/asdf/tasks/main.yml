---
- name: Check if asdf uses ~/.bashrc or ~/.zshrc (via real_home)
  stat:
    path: "{{ real_home }}/.zshrc"
  register: zshrc_file
  become: no

- name: Define shell rc path
  set_fact:
    shell_rc_path: "{{ real_home }}/.zshrc"
  when: zshrc_file.stat.exists

- name: Define shell rc path fallback to bashrc
  set_fact:
    shell_rc_path: "{{ real_home }}/.bashrc"
  when: not zshrc_file.stat.exists

- name: Clone asdf repository
  git:
    repo: https://github.com/asdf-vm/asdf.git
    dest: "{{ real_home }}/.asdf"
    version: v0.14.0
  become: no

- name: Add asdf to shell profile
  lineinfile:
    path: "{{ shell_rc_path }}"
    line: ". {{ real_home }}/.asdf/asdf.sh"
    create: yes
  become: no

- name: Add asdf completions to shell profile
  lineinfile:
    path: "{{ shell_rc_path }}"
    line: ". {{ real_home }}/.asdf/completions/asdf.bash"
    create: yes
  become: no
